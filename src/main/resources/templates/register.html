<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Allergy Guard | Secure Registration</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-wrapper">
<div class="auth-container">
    <header class="auth-header">
        <div class="logo">🛡️ Allergy Guard</div>
        <h1>Create Account</h1>
        <p>Start your journey to an allergy-free life.</p>
    </header>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"
         style="color: #f43f5e; background-color: #fff1f2; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; border: 1px solid #fecdd3;">
    </div>

    <form th:action="@{/register}" th:object="${person}" method="post" class="auth-form">
        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" th:field="*{name}" placeholder="John Doe" required>
        </div>
        <div class="input-group">
            <label for="age">Age</label>
            <input type="number" id="age" th:field="*{age}" placeholder="25" required>
        </div>
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" th:field="*{email}" placeholder="name@example.com" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <footer class="auth-footer">
        <p>Don't have an account? <a href="/login">Sign In</a></p>
    </footer>
</div>
</body>
</html>
