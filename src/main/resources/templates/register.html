<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<h2>Register</h2>
<form th:action="@{/register}" th:object="${person}" method="post">
    <label>Name:</label>
    <input type="text" th:field="*{name}" required/><br/><br/>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required/><br/><br/>

    <label>Password:</label>
    <input type="password" th:field="*{password}" required/><br/><br/>

    <button type="submit">Register</button>
</form>
<p>Already registered? <a th:href="@{/login}">Login here</a></p>
</body>
</html>
