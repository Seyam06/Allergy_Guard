<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Allergy Guard</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-wrapper">
<div class="auth-container">
    <header class="auth-header">
        <div class="logo">🛡️ Allergy Guard</div>
        <h1>Welcome Back</h1>
        <p>Access your personalized allergy dashboard.</p>
    </header>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form action="/login-process" method="post" class="auth-form">
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <footer class="auth-footer">
        <p>Don't have an account? <a href="/register">Register</a></p>
    </footer>
</div>
</body>
</html>
